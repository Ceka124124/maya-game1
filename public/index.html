<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🌋 TrustTower: Lava or Lie?</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
:root{
  --lava1:#ff4500;--lava2:#ff6a00;--lava3:#ff0000;
  --safe:#00e676;--safe2:#00c853;
  --trust:#4caf50;--distrust:#f44336;
  --gold:#ffd700;--purple:#9c27b0;
  --bg1:#0a0008;--bg2:#1a000e;--bg3:#080014;
}

/* ══ APP ══ */
.app{
  width:100%;max-width:430px;height:100dvh;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
  background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);
}

/* ══ LAVA BACKGROUND GLOW ══ */
.lava-bg{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 100%, rgba(255,69,0,.18) 0%, transparent 70%);
  animation:lavapulse 2s ease-in-out infinite alternate;
}
@keyframes lavapulse{from{opacity:.6}to{opacity:1}}

/* ══ TOPBAR ══ */
.topbar{
  height:50px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:0 12px;z-index:200;
  background:rgba(0,0,0,.7);border-bottom:1px solid rgba(255,100,0,.2);
  backdrop-filter:blur(16px);position:relative;
}
.tb-logo{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:900;color:#fff;}
.tb-logo .fire{font-size:18px;animation:fi .6s ease-in-out infinite alternate;}
@keyframes fi{from{transform:scale(1)}to{transform:scale(1.2) rotate(5deg)}}
.tb-logo .grad{background:linear-gradient(135deg,#ff6a00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-scores{display:flex;gap:8px;align-items:center;}
.score-pill{
  display:flex;align-items:center;gap:4px;
  padding:4px 8px;border-radius:12px;font-size:10px;font-weight:900;
  border:1px solid rgba(255,255,255,.15);
}
.score-pill.A{background:rgba(255,100,0,.2);color:#ff8844;}
.score-pill.B{background:rgba(100,180,255,.2);color:#88ccff;}
.score-falls{font-size:8px;color:#ff4444;}

/* ══ GAME AREA ══ */
.game-area{
  flex:0 0 auto;height:50dvh;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* ── TOWER ── */
.tower-wrap{
  position:relative;width:300px;height:100%;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding-bottom:10px;
}

/* Lava pool at bottom */
.lava-pool{
  position:absolute;bottom:0;left:0;right:0;height:36px;
  background:linear-gradient(to top, #ff2200, #ff6600, #ff9900);
  border-radius:4px;overflow:hidden;z-index:1;
}
.lava-wave{
  position:absolute;top:0;left:-100%;width:300%;height:100%;
  background:repeating-linear-gradient(
    90deg,
    rgba(255,200,0,.4) 0px,
    transparent 20px,
    rgba(255,150,0,.3) 40px
  );
  animation:lw 2s linear infinite;
}
@keyframes lw{from{transform:translateX(0)}to{transform:translateX(33.33%)}}
.lava-bubble{
  position:absolute;border-radius:50%;
  background:rgba(255,230,0,.6);animation:lb 1.5s ease-in-out infinite;
}
@keyframes lb{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.4);opacity:1}}

/* Tower floors */
.floors{
  display:flex;flex-direction:column;gap:3px;
  padding:0 10px;z-index:5;position:relative;
}
.floor-row{
  display:flex;align-items:center;gap:6px;height:34px;
}
.floor-num{
  font-size:9px;font-weight:900;color:rgba(255,255,255,.4);
  width:16px;text-align:right;flex-shrink:0;
}
.floor-block{
  flex:1;height:100%;border-radius:6px;position:relative;
  border:1px solid rgba(255,255,255,.08);
  transition:all .3s;overflow:hidden;
}
.floor-block.inactive{background:rgba(255,255,255,.04);}
.floor-block.current-floor{
  background:rgba(255,150,0,.15);
  border-color:rgba(255,150,0,.4);
  box-shadow:0 0 16px rgba(255,150,0,.3);
  animation:curfl .8s ease-in-out infinite alternate;
}
@keyframes curfl{from{box-shadow:0 0 10px rgba(255,150,0,.2)}to{box-shadow:0 0 24px rgba(255,150,0,.6)}}
.floor-block.done-safe{background:rgba(0,200,100,.1);border-color:rgba(0,200,100,.2);}
.floor-block.done-fall{background:rgba(255,50,0,.1);border-color:rgba(255,50,0,.2);}

/* Player tokens on floors */
.token{
  position:absolute;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;
  border:2px solid rgba(255,255,255,.4);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
  transition:all .5s cubic-bezier(.34,1.56,.64,1);
  z-index:3;
}
.token.A{background:linear-gradient(135deg,#ff6a00,#ff3300);left:8px;}
.token.B{background:linear-gradient(135deg,#4488ff,#1144cc);right:8px;}
.token.stander{
  animation:standpulse .6s ease-in-out infinite alternate;
}
@keyframes standpulse{from{box-shadow:0 0 6px rgba(255,215,0,.4)}to{box-shadow:0 0 18px rgba(255,215,0,.9),0 0 0 2px var(--gold)}}

/* Special floor indicators */
.floor-special{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  font-size:10px;opacity:.7;
}

/* ── CENTER STAGE ── */
.center-stage{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:20;text-align:center;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.floor-badge{
  background:rgba(0,0,0,.8);border:1px solid rgba(255,150,0,.4);
  border-radius:14px;padding:5px 14px;font-size:11px;font-weight:900;color:#ff9900;
  backdrop-filter:blur(8px);
}
.floor-type-badge{
  padding:3px 10px;border-radius:10px;font-size:10px;font-weight:800;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);color:#ddd;
}

/* ── LAVA REVEAL FLASH ── */
.reveal-flash{
  position:absolute;inset:0;z-index:100;pointer-events:none;
  opacity:0;transition:opacity .15s;
}
.reveal-flash.lava{background:radial-gradient(ellipse at 50% 80%,rgba(255,80,0,.7),transparent 60%);}
.reveal-flash.safe{background:radial-gradient(ellipse at 50% 80%,rgba(0,230,120,.4),transparent 60%);}
.reveal-flash.show{opacity:1;}

/* ── PLATFORM ── */
.platform-anim{
  position:absolute;bottom:52px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;gap:20px;align-items:flex-end;
}
.platform{
  width:80px;height:16px;border-radius:8px;
  position:relative;cursor:pointer;
  transition:all .2s;
}
.platform.left{background:linear-gradient(135deg,#ff6a00,#cc3300);}
.platform.right{background:linear-gradient(135deg,#4488ff,#1144cc);}
.platform.hover-scale:hover{transform:scaleX(1.08) scaleY(1.1);}
.platform-label{
  text-align:center;font-size:9px;font-weight:800;color:rgba(255,255,255,.7);
  margin-top:3px;
}

/* ══ ACTION PANEL ══ */
.action-panel{
  flex:0 0 auto;
  background:rgba(0,0,0,.85);border-top:1px solid rgba(255,100,0,.2);
  padding:10px 14px;z-index:100;position:relative;
  display:flex;flex-direction:column;gap:8px;
  min-height:130px;
}

/* Phase label */
.phase-label{
  font-size:11px;font-weight:800;text-align:center;
  padding:4px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:#ddd;
}
.phase-label.your-turn{background:rgba(255,150,0,.2);border-color:rgba(255,150,0,.4);color:#ffaa00;}
.phase-label.wait{background:rgba(100,100,100,.2);color:#888;}

/* Role display */
.role-display{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
}
.role-card{
  flex:1;padding:7px 10px;border-radius:12px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  text-align:center;
}
.role-card.me-stander{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.08);}
.role-card.me-answerer{border-color:rgba(100,180,255,.4);background:rgba(100,180,255,.08);}
.rc-label{font-size:8px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.5px;}
.rc-role{font-size:13px;font-weight:900;color:#fff;margin-top:2px;}
.rc-name{font-size:9px;color:#aaa;margin-top:1px;}

/* Action buttons */
.btn-row{display:flex;gap:8px;}
.act-btn{
  flex:1;padding:13px 8px;border-radius:16px;border:none;cursor:pointer;
  font-size:14px;font-weight:900;display:flex;align-items:center;
  justify-content:center;gap:6px;transition:all .15s;letter-spacing:.3px;
}
.act-btn:active{transform:scale(.94);}
.act-btn.yes{background:linear-gradient(135deg,#ff4500,#cc1100);color:#fff;box-shadow:0 5px 18px rgba(255,50,0,.4);}
.act-btn.no{background:linear-gradient(135deg,#2196f3,#0055cc);color:#fff;box-shadow:0 5px 18px rgba(33,150,243,.4);}
.act-btn.trust{background:linear-gradient(135deg,#4caf50,#1b7a1f);color:#fff;box-shadow:0 5px 18px rgba(76,175,80,.4);animation:trustpulse 1s ease-in-out infinite alternate;}
@keyframes trustpulse{from{box-shadow:0 5px 18px rgba(76,175,80,.3)}to{box-shadow:0 5px 28px rgba(76,175,80,.8)}}
.act-btn.distrust{background:linear-gradient(135deg,#f44336,#aa0000);color:#fff;box-shadow:0 5px 18px rgba(244,67,54,.4);}
.act-btn.disabled{background:rgba(255,255,255,.08);color:#555;cursor:not-allowed;box-shadow:none;}

/* Timer bar */
.timer-bar-wrap{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.timer-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#ff4500,#ffd700);
  transition:width .1s linear;}

/* Reveal card */
.reveal-card{
  padding:10px 14px;border-radius:14px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.reveal-card.lava{background:rgba(255,50,0,.15);border:1px solid rgba(255,100,0,.4);}
.reveal-card.safe{background:rgba(0,200,100,.1);border:1px solid rgba(0,200,100,.3);}
.reveal-icon{font-size:34px;animation:ricon .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes ricon{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.reveal-title{font-size:16px;font-weight:900;color:#fff;}
.reveal-sub{font-size:11px;color:#ccc;line-height:1.4;}

/* Special floor notice */
.special-notice{
  padding:7px 12px;border-radius:12px;font-size:11px;font-weight:700;
  text-align:center;border:1px solid;
}
.special-notice.timer{background:rgba(255,150,0,.15);border-color:rgba(255,150,0,.4);color:#ffaa00;}
.special-notice.truth{background:rgba(150,0,255,.15);border-color:rgba(150,0,255,.4);color:#cc88ff;}
.special-notice.doublelava{background:rgba(255,0,0,.15);border-color:rgba(255,0,0,.4);color:#ff6666;}
.special-notice.bluff{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.35);color:#ffd700;}
.special-notice.silence{background:rgba(100,100,100,.15);border-color:rgba(100,100,100,.4);color:#aaa;}
.special-notice.doublequestion{background:rgba(0,200,255,.1);border-color:rgba(0,200,255,.35);color:#00ccff;}
.special-notice.final{background:rgba(255,0,100,.15);border-color:rgba(255,0,100,.5);color:#ff44aa;}

/* Final pick buttons */
.final-platforms{
  display:flex;gap:12px;
}
.final-btn{
  flex:1;padding:14px 8px;border-radius:16px;border:2px solid rgba(255,255,255,.15);
  cursor:pointer;font-size:13px;font-weight:900;color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,.06);transition:all .18s;
}
.final-btn:active{transform:scale(.93);}
.final-btn.final-A{border-color:rgba(255,100,0,.4);}
.final-btn.final-B{border-color:rgba(100,180,255,.4);}
.final-btn:hover{background:rgba(255,255,255,.12);}
.final-btn-icon{font-size:28px;}

/* Double question answers display */
.dq-answers{
  display:flex;gap:6px;
}
.dq-ans{
  flex:1;padding:6px;border-radius:10px;text-align:center;font-size:11px;font-weight:800;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#ccc;
}
.dq-ans.given{background:rgba(255,150,0,.15);border-color:rgba(255,150,0,.3);color:#ffaa00;}

/* ══ CHAT ══ */
.chat-section{
  flex:1;display:flex;flex-direction:column;
  background:#0e0e18;overflow:hidden;
  border-top:1px solid rgba(255,100,0,.15);min-height:0;
}
.emoji-bar{display:flex;gap:2px;padding:4px 8px;background:rgba(0,0,0,.5);
  border-bottom:1px solid rgba(255,255,255,.05);overflow-x:auto;flex-shrink:0;}
.emoji-bar::-webkit-scrollbar{display:none;}
.ebtn{padding:2px 6px;border-radius:7px;background:rgba(255,255,255,.07);
  border:none;font-size:14px;cursor:pointer;flex-shrink:0;transition:all .12s;}
.ebtn:active{transform:scale(.75);}
.chat-msgs{flex:1;overflow-y:auto;padding:3px 0;display:flex;flex-direction:column;min-height:0;}
.chat-msgs::-webkit-scrollbar{width:2px;}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(255,100,0,.3);border-radius:2px;}
.cmsg{padding:3px 10px;display:flex;gap:6px;animation:ci .15s ease;}
@keyframes ci{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.cavt{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.cmc{flex:1;} .cmn{font-size:9px;font-weight:800;margin-bottom:1px;} .cmt{font-size:11px;line-height:1.35;word-break:break-word;}
.sys-row{display:flex;justify-content:center;padding:2px 8px;}
.sys-bub{background:rgba(255,100,0,.1);border:1px solid rgba(255,100,0,.15);
  border-radius:8px;padding:3px 10px;font-size:9px;color:#cc6633;font-weight:600;text-align:center;}
.reveal-row{display:flex;justify-content:center;padding:2px 8px;}
.reveal-bub{
  padding:4px 12px;border-radius:10px;font-size:10px;font-weight:700;text-align:center;
  border:1px solid;max-width:90%;
}
.reveal-bub.lava{background:rgba(255,50,0,.15);border-color:rgba(255,80,0,.3);color:#ff8866;}
.reveal-bub.safe{background:rgba(0,200,100,.1);border-color:rgba(0,200,100,.25);color:#66cc88;}
.chat-inp-row{display:flex;align-items:center;padding:5px 8px;
  background:rgba(0,0,0,.5);border-top:1px solid rgba(255,255,255,.06);gap:5px;flex-shrink:0;}
.chat-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:6px 11px;color:#fff;font-size:12px;outline:none;}
.chat-inp::placeholder{color:#555;}
.chat-send{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ff6a00,#cc3300);
  color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-send:active{transform:scale(.88);}

/* ══ EMOJI BURST ══ */
.eburst{position:fixed;font-size:40px;pointer-events:none;z-index:9999;animation:ebst .9s ease forwards;}
@keyframes ebst{0%{transform:scale(0);opacity:1}60%{transform:scale(1.5) translateY(-50px);opacity:1}100%{transform:scale(1) translateY(-100px);opacity:0}}

/* ══ TOAST ══ */
.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.95);color:#fff;padding:8px 18px;border-radius:18px;
  font-size:12px;font-weight:700;z-index:6000;pointer-events:none;
  opacity:0;transition:opacity .25s;border:1px solid rgba(255,100,0,.3);
  max-width:340px;text-align:center;white-space:nowrap;}
.toast.show{opacity:1;}

/* ══ JOIN ══ */
.join-screen{
  position:fixed;inset:0;z-index:2000;
  background:linear-gradient(145deg,#0a0008,#1a000e 50%,#080014);
  display:flex;align-items:center;justify-content:center;
}
.join-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,100,0,.2);
  border-radius:26px;padding:32px 26px;width:calc(100% - 40px);max-width:360px;
  text-align:center;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,.7);
}
.join-fire{font-size:54px;animation:fi .6s ease-in-out infinite alternate;margin-bottom:10px;}
.join-t{font-size:22px;font-weight:900;color:#fff;margin-bottom:3px;}
.join-subt{font-size:13px;font-weight:800;background:linear-gradient(135deg,#ff6a00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.join-s{font-size:11px;color:#666;margin-bottom:22px;line-height:1.5;}
.join-inp-row{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,100,0,.2);border-radius:13px;padding:10px 13px;margin-bottom:14px;}
.join-inp-row i{color:#ff6633;font-size:13px;}
.join-inp{flex:1;background:none;border:none;outline:none;font-size:14px;font-weight:700;color:#fff;}
.join-inp::placeholder{color:#444;}
.join-btn{
  width:100%;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#ff6a00,#ff0044);
  color:#fff;font-size:15px;font-weight:900;cursor:pointer;
  box-shadow:0 6px 22px rgba(255,100,0,.4);transition:all .15s;
}
.join-btn:active{transform:scale(.96);}
.join-hint{font-size:10px;color:#444;margin-top:10px;}

/* ══ WIN OVERLAY ══ */
.win-overlay{
  position:fixed;inset:0;z-index:3000;
  background:rgba(0,0,0,.9);backdrop-filter:blur(10px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.win-overlay.show{display:flex;}
.win-emoji{font-size:72px;animation:wobble 1s ease-in-out infinite alternate;}
@keyframes wobble{from{transform:scale(1) rotate(-8deg)}to{transform:scale(1.15) rotate(8deg)}}
.win-title{font-size:26px;font-weight:900;color:#fff;text-align:center;}
.win-sub{font-size:13px;color:#bbb;text-align:center;}
.win-scores{display:flex;gap:14px;}
.ws-card{padding:12px 18px;border-radius:14px;text-align:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);}
.ws-name{font-size:11px;color:#aaa;font-weight:700;}
.ws-val{font-size:20px;font-weight:900;color:#fff;}
.ws-falls{font-size:10px;color:#ff5555;}
.win-btn{padding:13px 32px;border-radius:18px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#ff6a00,#ff0044);color:#fff;font-size:15px;font-weight:900;
  box-shadow:0 6px 22px rgba(255,100,0,.4);}

/* ══ WAITING ══ */
.wait-overlay{
  position:absolute;inset:0;z-index:50;
  background:rgba(0,0,0,.88);backdrop-filter:blur(8px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.wait-overlay.show{display:flex;}
.wait-icon{font-size:52px;animation:wi 2s ease-in-out infinite;}
@keyframes wi{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wait-t{font-size:20px;font-weight:900;color:#fff;}
.wait-s{font-size:11px;color:#888;text-align:center;}
.copy-btn{padding:10px 22px;border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#ff6a00,#cc2200);color:#fff;font-size:12px;font-weight:800;}
</style>
</head>
<body>

<!-- JOIN -->
<div class="join-screen" id="joinScreen">
  <div class="join-card">
    <div class="join-fire">🌋</div>
    <div class="join-t">TrustTower</div>
    <div class="join-subt">Lava or Lie?</div>
    <div class="join-s">10 Katlı Kule · Blöf · Psikoloji · Risk</div>
    <div class="join-inp-row">
      <i class="fa-solid fa-user"></i>
      <input class="join-inp" id="nameInp" placeholder="Adınızı daxil edin..." maxlength="20" autocomplete="off">
    </div>
    <button class="join-btn" onclick="doJoin()">🔥 Oyuna Qoşul</button>
    <div class="join-hint">?room=ID ilə xüsusi otağa qoşul | Link kopyala, dostu çağır</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="mainApp" style="display:none;">
  <div class="lava-bg"></div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-logo">
      <span class="fire">🌋</span>
      <span class="grad">TRUSTTOWER</span>
    </div>
    <div class="tb-scores">
      <div class="score-pill A" id="scoreA">A — 0 kat <span class="score-falls" id="fallsA"></span></div>
      <div class="score-pill B" id="scoreB">B — 0 kat <span class="score-falls" id="fallsB"></span></div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div class="game-area" id="gameArea">
    <div class="lava-bg" style="opacity:.4;"></div>

    <!-- TOWER -->
    <div class="tower-wrap">
      <div class="floors" id="floorsEl"></div>
      <div class="lava-pool">
        <div class="lava-wave"></div>
        <div class="lava-bubble" style="left:15%;width:8px;height:8px;animation-delay:0s;"></div>
        <div class="lava-bubble" style="left:45%;width:6px;height:6px;animation-delay:.5s;"></div>
        <div class="lava-bubble" style="left:75%;width:10px;height:10px;animation-delay:1s;"></div>
      </div>
    </div>

    <!-- Reveal flash -->
    <div class="reveal-flash" id="revealFlash"></div>

    <!-- Wait overlay -->
    <div class="wait-overlay" id="waitOverlay">
      <div class="wait-icon">⏳</div>
      <div class="wait-t">Rəqib gözlənilir...</div>
      <div class="wait-s" id="waitSub">Link kopyalayın, dostunuzu çağırın</div>
      <button class="copy-btn" onclick="copyLink()">🔗 Linki Kopyala</button>
    </div>
  </div>

  <!-- ACTION PANEL -->
  <div class="action-panel" id="actionPanel">
    <div class="phase-label" id="phaseLbl">Gözlənilir...</div>
    <div id="actionContent"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-section">
    <div class="emoji-bar">
      <button class="ebtn" onclick="sendEmoji('😂')">😂</button>
      <button class="ebtn" onclick="sendEmoji('🔥')">🔥</button>
      <button class="ebtn" onclick="sendEmoji('😮')">😮</button>
      <button class="ebtn" onclick="sendEmoji('🤔')">🤔</button>
      <button class="ebtn" onclick="sendEmoji('😈')">😈</button>
      <button class="ebtn" onclick="sendEmoji('🙃')">🙃</button>
      <button class="ebtn" onclick="sendEmoji('💀')">💀</button>
      <button class="ebtn" onclick="sendEmoji('🎭')">🎭</button>
      <button class="ebtn" onclick="sendEmoji('🃏')">🃏</button>
      <button class="ebtn" onclick="sendEmoji('👁️')">👁️</button>
    </div>
    <div class="chat-msgs" id="chatMsgs">
      <div class="sys-row"><div class="sys-bub">🌋 TrustTower'a Xoş Gəldiniz! Lava or Lie?</div></div>
    </div>
    <div class="chat-inp-row">
      <input class="chat-inp" id="chatInp" placeholder="Mesaj yaz... (Sessizlik katında yasak!)" maxlength="300" autocomplete="off">
      <button class="chat-send" onclick="sendChat()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-emoji" id="winEmoji">🏆</div>
  <div class="win-title" id="winTitle">Qalib!</div>
  <div class="win-sub"  id="winSub"></div>
  <div class="win-scores" id="winScores"></div>
  <button class="win-btn" onclick="requestNewGame()">🔄 Yenidən Oyna</button>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
const urlP    = new URLSearchParams(location.search);
const urlName = urlP.get('isim') || urlP.get('name') || '';
const urlRoom = urlP.get('room') || '';

const LS_NAME  = 'tt_name';
const LS_ROOM  = 'tt_room';
const LS_SLOT  = 'tt_slot';

let socket;
let mySlot   = null;   // 'A' | 'B'
let roomId   = null;
let gs       = null;   // game state
let seenIds  = new Set();
let timerInt = null;

const FLOOR_LABELS = {
  standard:      '⚡ Standart Kat',
  timer:         '⏱ Zaman Sınırlı Kat',
  truth:         '🔮 Həqiqət Katı',
  doublelava:    '🌋🌋 Qoşa Lava Katı (%70)',
  bluff:         '🃏 Blöf Bonusu Katı',
  silence:       '🤫 Sessizlik Katı',
  doublequestion:'❓❓ Qoşa Soru Katı',
  final:         '🏆 FİNAL KATI',
};
const FLOOR_SPECIALS = {
  timer:         '⏱ 5 saniyə ərzində qərar ver!',
  truth:         '🔮 Cavabçı MÜTLƏQİ həqiqəti deməlidir!',
  doublelava:    '🌋 Bu katda lava ehtimalı %70-dir!',
  bluff:         '🃏 Uğurlu yalan = Cavabçıya +2 kat bonus!',
  silence:       '🤫 Bu katda YAZMAq YASAQDIR!',
  doublequestion:'❓ Cavabçıya 2 dəfə sual verə bilərsiniz!',
  final:         '🏆 İki platformdan birini seç — biri lava biri güvənli!',
};

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const sName = localStorage.getItem(LS_NAME) || urlName;
  if (sName) document.getElementById('nameInp').value = sName;
  document.getElementById('nameInp').addEventListener('keypress', e => { if (e.key==='Enter') doJoin(); });
  document.getElementById('chatInp').addEventListener('keypress', e => { if (e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); }});

  // Auto rejoin
  const sRoom = localStorage.getItem(LS_ROOM);
  const sSlot = localStorage.getItem(LS_SLOT);
  if (sRoom && sSlot && sName) {
    showApp();
    initSocket(() => {
      socket.emit('rejoin', { roomId: sRoom, slot: sSlot, name: sName }, res => {
        if (res?.ok) { mySlot = sSlot; roomId = sRoom; showT('✅ Oyuna qayıtdınız!'); }
        else { localStorage.removeItem(LS_ROOM); localStorage.removeItem(LS_SLOT); showJoin(); }
      });
    });
  }
});

function showJoin() { document.getElementById('joinScreen').style.display='flex'; document.getElementById('mainApp').style.display='none'; }
function showApp()  { document.getElementById('joinScreen').style.display='none'; document.getElementById('mainApp').style.display='flex'; }

function doJoin() {
  const name = document.getElementById('nameInp').value.trim();
  if (!name) { showT('⚠️ Adınızı daxil edin!'); return; }
  localStorage.setItem(LS_NAME, name);
  showApp();
  initSocket(() => {
    socket.emit('join', { name, roomId: urlRoom || undefined }, res => {
      if (!res?.ok) { showT('❌ Xəta'); return; }
      mySlot = res.slot;
      roomId = res.roomId;
      localStorage.setItem(LS_ROOM, roomId);
      localStorage.setItem(LS_SLOT, mySlot);
      showT(`✅ Oyunçu ${mySlot} olaraq qoşuldunuz!`);
    });
  });
}

/* ══════════════════════════════════════
   SOCKET
══════════════════════════════════════ */
function initSocket(onConnect) {
  socket = io({ transports: ['websocket', 'polling'] });
  socket.on('connect',    () => onConnect?.());
  socket.on('disconnect', () => showT('🔴 Əlaqə kəsildi...'));
  socket.on('state',      s  => { gs = s; render(); });
  socket.on('history',    ms => ms.forEach(appendMsg));
  socket.on('msg',        m  => appendMsg(m));
  socket.on('emoji',      d  => showBurst(d.emoji));
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render() {
  if (!gs) return;
  renderTower();
  renderScores();
  renderActionPanel();
  // Wait overlay
  const waiting = !gs.players?.A || !gs.players?.B;
  document.getElementById('waitOverlay').classList.toggle('show', waiting);
  // Win overlay
  if (gs.phase === 'ended' && gs.winner !== undefined) renderWin();
  else document.getElementById('winOverlay').classList.remove('show');
}

/* ── TOWER ── */
function renderTower() {
  const el    = document.getElementById('floorsEl');
  const floor = gs.floor || 0;
  // Render floors 10 down to 1
  let html = '';
  for (let f = 10; f >= 1; f--) {
    const isCur  = f === floor;
    const isDone = f < floor;
    const cfg    = floorCfg(f);
    const special = cfg ? FLOOR_LABELS[cfg.type] : '';

    let cls = 'floor-block inactive';
    if (isCur)  cls = 'floor-block current-floor';
    if (isDone) cls = 'floor-block done-safe';

    // tokens
    let tokensHtml = '';
    if (isCur && gs.stander && gs.players) {
      const stander  = gs.stander;
      const answerer = gs.answerer;
      tokensHtml += `<div class="token ${stander} stander">${gs.players[stander]?.name?.[0]||stander}</div>`;
    }

    // Show A/B level progress
    const aLvl = gs.levels?.A || 0;
    const bLvl = gs.levels?.B || 0;
    if (f <= aLvl && gs.players?.A) tokensHtml += `<div class="token A" style="opacity:.5;">${gs.players.A?.name?.[0]||'A'}</div>`;
    if (f <= bLvl && gs.players?.B && f !== (isCur && gs.stander==='B' ? floor : -1))
      tokensHtml += `<div class="token B" style="opacity:.5;">${gs.players.B?.name?.[0]||'B'}</div>`;

    const specialIcon = {
      timer:'⏱',truth:'🔮',doublelava:'🌋',bluff:'🃏',silence:'🤫',doublequestion:'❓',final:'🏆'
    }[cfg?.type] || '';

    html += `<div class="floor-row">
      <div class="floor-num">${f}</div>
      <div class="${cls}">
        ${tokensHtml}
        ${specialIcon ? `<div class="floor-special">${specialIcon}</div>` : ''}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function floorCfg(f) {
  const cfgs = [null,
    {type:'standard'},{type:'standard'},{type:'standard'},
    {type:'timer'},{type:'truth'},{type:'doublelava'},
    {type:'bluff'},{type:'silence'},{type:'doublequestion'},{type:'final'}
  ];
  return cfgs[f] || null;
}

/* ── SCORES ── */
function renderScores() {
  const pa = gs.players?.A, pb = gs.players?.B;
  const la = gs.levels?.A || 0, lb = gs.levels?.B || 0;
  const fa = gs.falls?.A  || 0, fb = gs.falls?.B  || 0;
  document.getElementById('scoreA').innerHTML =
    `${pa?.name||'A'} — ${la} kat ${fa>0?`<span class="score-falls">💀x${fa}</span>`:''}`;
  document.getElementById('scoreB').innerHTML =
    `${pb?.name||'B'} — ${lb} kat ${fb>0?`<span class="score-falls">💀x${fb}</span>`:''}`;
}

/* ── ACTION PANEL ── */
function renderActionPanel() {
  if (!gs || !gs.players?.A || !gs.players?.B) return;

  const lbl = document.getElementById('phaseLbl');
  const ac  = document.getElementById('actionContent');
  const phase = gs.phase;
  const cfg   = gs.floorConfig;
  const isStander  = mySlot === gs.stander;
  const isAnswerer = mySlot === gs.answerer;
  const oppSlot    = mySlot === 'A' ? 'B' : 'A';
  const myName     = gs.players[mySlot]?.name || '?';
  const oppName    = gs.players[oppSlot]?.name || '?';

  // Clear timer
  clearInterval(timerInt);

  let lblTxt = '', lblCls = 'phase-label', content = '';

  if (phase === 'lobby' || phase === 'between') {
    lblTxt = '⏳ Hazırlanılır...';
    content = '';

  } else if (phase === 'answering') {
    // Special notice
    let specialHtml = '';
    if (cfg?.type && FLOOR_SPECIALS[cfg.type]) {
      specialHtml = `<div class="special-notice ${cfg.type}">${FLOOR_SPECIALS[cfg.type]}</div>`;
    }

    // Double question: show which answer given
    let dqHtml = '';
    if (cfg?.type === 'doublequestion') {
      const a1txt = gs.answer ? (gs.answer === 'yes' ? '🔴 BƏLI' : '🔵 XEYİR') : '❓ Gözlənilir';
      dqHtml = `<div class="dq-answers">
        <div class="dq-ans ${gs.answer?'given':''}">1. Cavab: ${a1txt}</div>
        <div class="dq-ans">2. Cavab: ❓</div>
      </div>`;
    }

    if (isAnswerer) {
      lblTxt = `🎭 SİZİN NÖVBƏNIZ — Cavab verin!`;
      lblCls = 'phase-label your-turn';
      const qNum = cfg?.type === 'doublequestion' && gs.answer ? '2-ci' : '1-ci';
      content = `
        ${specialHtml}
        ${dqHtml}
        <div style="font-size:11px;color:#aaa;text-align:center;margin-bottom:6px;">
          "<b style="color:#fff">${gs.players[gs.stander]?.name}</b>" platformdadır — altında lava var mı?
          ${cfg?.type==='doublequestion'?`(${qNum} cavab)`:''}
        </div>
        <div class="btn-row">
          <button class="act-btn yes" onclick="submitAnswer('yes')">🔴 BƏLI, Lava Var</button>
          <button class="act-btn no"  onclick="submitAnswer('no')">🔵 XEYİR, Yoxdur</button>
        </div>`;
    } else {
      lblTxt = `⏳ ${oppName} cavab verir...`;
      lblCls = 'phase-label wait';
      content = `${specialHtml}${dqHtml}<div style="font-size:11px;color:#666;text-align:center;">Platformda durursunuz — cavabı gözləyin</div>`;
    }

  } else if (phase === 'deciding') {
    // Special notice
    let specialHtml = '';
    if (cfg?.type && FLOOR_SPECIALS[cfg.type]) {
      specialHtml = `<div class="special-notice ${cfg.type}">${FLOOR_SPECIALS[cfg.type]}</div>`;
    }

    // Double question answers display
    let dqHtml = '';
    if (cfg?.type === 'doublequestion') {
      const a1 = gs.answer==='yes'?'🔴 BƏLI':'🔵 XEYİR';
      const a2 = gs.secondAnswer==='yes'?'🔴 BƏLI':gs.secondAnswer==='no'?'🔵 XEYİR':'❓';
      dqHtml = `<div class="dq-answers">
        <div class="dq-ans given">1: ${a1}</div>
        <div class="dq-ans ${gs.secondAnswer?'given':''}">2: ${a2}</div>
      </div>`;
    }

    // Answer display
    const ansDisplay = gs.answer === 'yes'
      ? '<span style="color:#ff6644;font-weight:900;font-size:14px;">🔴 BƏLI — Lava var dedi!</span>'
      : '<span style="color:#4488ff;font-weight:900;font-size:14px;">🔵 XEYİR — Lava yoxdur dedi!</span>';

    // Timer
    let timerHtml = '';
    if (cfg?.type === 'timer' && gs.timerEnd) {
      timerHtml = `<div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>`;
    }

    if (isStander) {
      lblTxt = `🎯 SİZİN NÖVBƏNIZ — Qərar verin!`;
      lblCls = 'phase-label your-turn';
      content = `
        ${specialHtml}
        ${dqHtml}
        <div style="text-align:center;margin:4px 0;">${ansDisplay}</div>
        ${timerHtml}
        <div class="btn-row">
          <button class="act-btn trust" onclick="submitDecide('trust')">🔓 Güvən (Atla)</button>
          <button class="act-btn distrust" onclick="submitDecide('distrust')">❌ Güvənmə (Dur)</button>
        </div>`;
    } else {
      lblTxt = `⏳ ${oppName} qərar verir...`;
      lblCls = 'phase-label wait';
      content = `
        ${specialHtml}
        ${dqHtml}
        <div style="text-align:center;margin:4px 0;">${ansDisplay}</div>
        ${timerHtml}
        <div style="font-size:11px;color:#666;text-align:center;">Cavab verdiniz — qərarı gözləyin</div>`;
    }

    // Tick timer
    if (cfg?.type === 'timer' && gs.timerEnd) {
      timerInt = setInterval(() => {
        const bar = document.getElementById('timerBar');
        if (!bar) { clearInterval(timerInt); return; }
        const left = Math.max(0, gs.timerEnd - Date.now());
        bar.style.width = (left / 5000 * 100) + '%';
        if (left <= 0) { clearInterval(timerInt); bar.style.width='0%'; }
      }, 80);
    }

  } else if (phase === 'final_pick') {
    const sp = `<div class="special-notice final">${FLOOR_SPECIALS.final}</div>`;
    if (isStander) {
      lblTxt = '🏆 FİNAL — Platform Seç!';
      lblCls = 'phase-label your-turn';
      content = `${sp}
        <div style="font-size:11px;color:#aaa;text-align:center;margin-bottom:8px;">İki platformdan biri güvənli, biri lava — hansını seçirsən?</div>
        <div class="final-platforms">
          <button class="final-btn final-A" onclick="submitFinalPick('A')">
            <div class="final-btn-icon" style="background:linear-gradient(135deg,#ff6a00,#cc2200);width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto;">🅰</div>
            Platform A
          </button>
          <button class="final-btn final-B" onclick="submitFinalPick('B')">
            <div class="final-btn-icon" style="background:linear-gradient(135deg,#4488ff,#1144cc);width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto;">🅱</div>
            Platform B
          </button>
        </div>`;
    } else {
      lblTxt = `⏳ ${oppName} platform seçir...`;
      lblCls = 'phase-label wait';
      content = `${sp}<div style="font-size:11px;color:#666;text-align:center;">Rəqib final platformunu seçir...</div>`;
    }

  } else if (phase === 'reveal') {
    const lava    = gs.isLava;
    const trusted = gs.decision === 'trust';
    let outcome = '';
    if (trusted && lava)   outcome = '💀 Düşdü! Lava həqiqi idi!';
    if (trusted && !lava)  outcome = '🎉 Güvəndi və doğru idi! +1 kat';
    if (!trusted && lava)  outcome = '🛡 Güvənmədi — kurtuldu! +1 kat';
    if (!trusted && !lava) outcome = '😬 Güvənmədi — amma lava yox idi. Fürsət qaçırdı.';
    if (gs.phase === 'reveal' && gs.isLava === null) outcome = '🏆 Final nəticəsi...';

    const rcls = lava ? 'reveal-card lava' : 'reveal-card safe';
    const icon = lava ? '🌋' : '✅';
    lblTxt = lava ? '🌋 LAVA VAR EDİ!' : '✅ ZEMİN GÜVƏNLİ İDİ';
    lblCls = `phase-label ${lava?'your-turn':''}`;
    content = `<div class="${rcls}">
      <div class="reveal-icon">${icon}</div>
      <div class="reveal-title">${lava?'🌋 LAVA!':'✅ GÜVƏNLİ!'}</div>
      <div class="reveal-sub">${outcome}</div>
    </div>`;

    // Flash
    flashReveal(lava);
  }

  // Role cards
  const roleSuffix = isStander ? 'me-stander' : isAnswerer ? 'me-answerer' : '';
  const myRoleLabel = isStander ? '🏠 Platformda' : '🎭 Cavabçı';
  const oppRoleLabel = isStander ? '🎭 Cavabçı' : '🏠 Platformda';

  const roleHtml = `<div class="role-display" style="margin-bottom:6px;">
    <div class="role-card ${roleSuffix}">
      <div class="rc-label">SİZ</div>
      <div class="rc-role">${myRoleLabel}</div>
      <div class="rc-name">${gs.players[mySlot]?.name||'?'}</div>
    </div>
    <div style="font-size:18px;color:#555;align-self:center;">⚔️</div>
    <div class="role-card">
      <div class="rc-label">RƏQİB</div>
      <div class="rc-role">${oppRoleLabel}</div>
      <div class="rc-name">${gs.players[oppSlot]?.name||'?'}</div>
    </div>
  </div>`;

  lbl.textContent = lblTxt;
  lbl.className   = lblCls;
  ac.innerHTML    = (phase !== 'lobby' && phase !== 'between') ? roleHtml + content : content;
}

/* ── WIN OVERLAY ── */
function renderWin() {
  document.getElementById('winOverlay').classList.add('show');
  const w = gs.winner;
  const isMe = w === mySlot;
  const oppSlot = mySlot === 'A' ? 'B' : 'A';
  document.getElementById('winEmoji').textContent  = isMe ? '🏆' : '💀';
  document.getElementById('winTitle').textContent  = isMe
    ? `🎉 ${gs.players[mySlot]?.name} QAZANDI!`
    : `😔 ${gs.players[w]?.name} Qazandı!`;
  document.getElementById('winSub').textContent    = isMe ? 'Psixoloji ustadsan!' : 'Növbəti dəfə daha yaxşı!';
  document.getElementById('winScores').innerHTML   = `
    <div class="ws-card">
      <div class="ws-name">${gs.players.A?.name||'A'}</div>
      <div class="ws-val">${gs.levels?.A||0} kat</div>
      <div class="ws-falls">💀 ${gs.falls?.A||0} düşüş</div>
    </div>
    <div class="ws-card">
      <div class="ws-name">${gs.players.B?.name||'B'}</div>
      <div class="ws-val">${gs.levels?.B||0} kat</div>
      <div class="ws-falls">💀 ${gs.falls?.B||0} düşüş</div>
    </div>`;
}

/* ── REVEAL FLASH ── */
function flashReveal(lava) {
  const el = document.getElementById('revealFlash');
  el.className = 'reveal-flash ' + (lava ? 'lava' : 'safe') + ' show';
  setTimeout(() => el.classList.remove('show'), 800);
}

/* ══════════════════════════════════════
   ACTIONS
══════════════════════════════════════ */
function submitAnswer(ans) {
  socket?.emit('answer', { answer: ans }, res => {
    if (res && !res.ok) showT('⚠️ ' + (res.e || 'Xəta'));
  });
}
function submitDecide(dec) {
  socket?.emit('decide', { decision: dec }, res => {
    if (res && !res.ok) showT('⚠️ ' + (res.e || 'Xəta'));
  });
}
function submitFinalPick(pick) {
  socket?.emit('final_pick', { pick }, res => {
    if (res && !res.ok) showT('⚠️ ' + (res.e || 'Xəta'));
  });
}
function requestNewGame() {
  socket?.emit('new_game', {}, res => {
    if (res?.ok) document.getElementById('winOverlay').classList.remove('show');
    else showT('⚠️ Yeni oyun başladıla bilmədi');
  });
}

/* ══════════════════════════════════════
   CHAT & EMOJI
══════════════════════════════════════ */
function sendChat() {
  if (gs?.silenceFloor) { showT('🤫 Sessizlik katında yazmaq yasaqdir!'); return; }
  const inp = document.getElementById('chatInp');
  const txt = inp.value.trim(); if (!txt) return;
  inp.value = '';
  socket?.emit('chat', { text: txt });
}
function sendEmoji(e) { socket?.emit('emoji', { emoji: e }); }
function showBurst(emoji) {
  const d = document.createElement('div');
  d.className = 'eburst'; d.textContent = emoji;
  d.style.left = (40 + Math.random() * (window.innerWidth - 80)) + 'px';
  d.style.top  = (window.innerHeight * .2 + Math.random() * (window.innerHeight * .4)) + 'px';
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 950);
}

function appendMsg(m) {
  if (m.id && seenIds.has(m.id)) return;
  if (m.id) seenIds.add(m.id);
  const c = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  if (m.type === 'system') {
    d.className = 'sys-row';
    d.innerHTML = `<div class="sys-bub">${esc(m.body)}</div>`;
  } else if (m.type === 'reveal') {
    d.className = 'reveal-row';
    d.innerHTML = `<div class="reveal-bub ${m.lava?'lava':'safe'}">${esc(m.body)}</div>`;
  } else if (m.type === 'chat') {
    d.className = 'cmsg';
    const col = m.slot === 'A' ? '#ff8844' : '#88aaff';
    d.innerHTML = `<div class="cavt" style="background:${col}">${esc((m.name||'?')[0])}</div>
      <div class="cmc"><div class="cmn" style="color:${col}">${esc(m.name||'?')}</div>
      <div class="cmt" style="color:#ccc">${esc(m.body)}</div></div>`;
  }
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function copyLink() {
  const url = location.origin + (roomId ? '?room=' + roomId : '');
  navigator.clipboard?.writeText(url).then(() => showT('✅ Link kopyalandı!')).catch(() => showT(url));
}
let _tt;
function showT(msg, dur=2800) {
  const t = document.getElementById('toast');
  clearTimeout(_tt); t.textContent = msg; t.classList.add('show');
  _tt = setTimeout(() => t.classList.remove('show'), dur);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
